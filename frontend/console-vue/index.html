<!doctype html>
<html lang="zh-CN" data-theme="day">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宛委·枢忆 · 花朝台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='%23D9708E'%3E%3Ccircle cx='16' cy='8' r='5'/%3E%3Ccircle cx='23.7' cy='13.5' r='5'/%3E%3Ccircle cx='20.7' cy='22.5' r='5'/%3E%3Ccircle cx='11.3' cy='22.5' r='5'/%3E%3Ccircle cx='8.3' cy='13.5' r='5'/%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='3.2' fill='%23C8453C'/%3E%3C/svg%3E" />
    <script>
      /* 首屏前应用已存主题，避免昼夜闪烁 */
      ;(function () {
        try {
          var t = localStorage.getItem('gf-theme')
          document.documentElement.dataset.theme = t === 'night' ? 'night' : 'day'
        } catch (e) {
          document.documentElement.dataset.theme = 'day'
        }
      })()
    </script>
    <!-- LXGW WenKai webfont：非阻塞加载，失败自然回退系统楷体（KaiTi/STKaiti） -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" />
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
