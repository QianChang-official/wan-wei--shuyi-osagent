[pytest]
# v0.9.6 (T7): warnings hygiene.
#
# Policy:
# - Our OWN code must stay warning-clean: any DeprecationWarning raised from
#   backend.app.* is escalated to an error so regressions fail the build.
# - Third-party deprecations we cannot fix without modifying site-packages are
#   silenced (recorded here, not monkey-patched). These are upstream issues in
#   FastAPI / Starlette on Python 3.14 (`asyncio.iscoroutinefunction`) and
#   pytest's own unraisable-exception ResourceWarning surfacing under -W always.
#
# Boundary: we do NOT edit installed packages; we only scope what pytest reports.
testpaths = backend/app
filterwarnings =
    # Escalate our own deprecations to errors (keeps project code clean).
    error::DeprecationWarning:backend.app
    # Silence known upstream deprecations (cannot fix without patching deps).
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
    # Silence pytest's unraisable ResourceWarning surfacing (SQLite handles in
    # TestClient worker threads; see reports/v0.9.6_completion_report.md).
    ignore::ResourceWarning
