name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Resolve release metadata
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ "$TAG" != v* ]]; then
            echo "Release tag must start with v" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Validate version and release prerequisites
        run: python scripts/release_preflight.py --tag "${{ env.RELEASE_TAG }}"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
          cache: npm
          cache-dependency-path: frontend/console-vue/package-lock.json
      - run: python -m pip install -r backend/requirements-dev.txt
      - run: python -m pytest --basetemp .pytest-release -p no:cacheprovider
      - working-directory: frontend/console-vue
        run: npm ci
      - working-directory: frontend/console-vue
        run: npm run build
      - run: git diff --exit-code -- frontend/console-vue/dist
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ env.RELEASE_TAG }}
          platforms: linux/amd64,linux/arm64
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Build source artifacts
        shell: bash
        run: |
          git archive --format=tar.gz --prefix="wanwei-shuyi-${RELEASE_TAG}/" --output="wanwei-shuyi-${RELEASE_TAG}.tar.gz" HEAD
          git archive --format=zip --prefix="wanwei-shuyi-${RELEASE_TAG}/" --output="wanwei-shuyi-${RELEASE_TAG}.zip" HEAD
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: wanwei-shuyi-${{ env.RELEASE_TAG }}.cdx.json
          upload-artifact: false
      - name: Create checksums
        shell: bash
        run: sha256sum "wanwei-shuyi-${RELEASE_TAG}.tar.gz" "wanwei-shuyi-${RELEASE_TAG}.zip" "wanwei-shuyi-${RELEASE_TAG}.cdx.json" > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            wanwei-shuyi-${{ env.RELEASE_TAG }}.tar.gz
            wanwei-shuyi-${{ env.RELEASE_TAG }}.zip
            wanwei-shuyi-${{ env.RELEASE_TAG }}.cdx.json
            SHA256SUMS
