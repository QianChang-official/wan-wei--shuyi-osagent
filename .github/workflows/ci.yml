name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements-dev.txt
      - run: python -m compileall -q backend/app
      - run: python -m pytest --basetemp tmp/pytest-ci -p no:cacheprovider

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/console-vue/package-lock.json
      - working-directory: frontend/console-vue
        run: npm ci
      - working-directory: frontend/console-vue
        run: npm run build
      - run: git diff --exit-code -- frontend/console-vue/dist

  integration:
    name: HTTP integration smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements-dev.txt
      - name: Start application
        shell: bash
        env:
          WANWEI_API_KEY: ci-integration-key-with-32-characters
          WANWEI_MEMORY_DB: ${{ runner.temp }}/wanwei-integration.db
          WANWEI_PRODUCTION: "1"
        run: |
          python -m uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8010 --no-proxy-headers > "$RUNNER_TEMP/wanwei.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/wanwei.pid"
          for _ in {1..40}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/ready', timeout=2).read()"; then
              exit 0
            fi
            sleep 0.25
          done
          cat "$RUNNER_TEMP/wanwei.log"
          exit 1
      - name: Run delivery smoke
        run: python scripts/smoke.py --api-key ci-integration-key-with-32-characters
      - name: Show server log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/wanwei.log"
      - name: Stop application
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/wanwei.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/wanwei.pid")" || true
          fi

  container:
    name: Hardened container smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: wanwei-shuyi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify non-root image metadata
        run: test "$(docker image inspect wanwei-shuyi:ci --format '{{.Config.User}}')" = "10001:10001"
      - name: Run locked-down container
        shell: bash
        run: |
          docker run --detach --name wanwei-ci \
            --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /data:rw,noexec,nosuid,size=64m,uid=10001,gid=10001 \
            --cap-drop ALL --security-opt no-new-privileges \
            -e WANWEI_API_KEY=ci-container-key-with-32-characters \
            -p 127.0.0.1:8010:8010 wanwei-shuyi:ci
          for _ in {1..60}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/ready', timeout=2).read()"; then
              exit 0
            fi
            sleep 0.5
          done
          docker logs wanwei-ci
          exit 1
      - run: python scripts/smoke.py --api-key ci-container-key-with-32-characters
      - name: Show container log on failure
        if: failure()
        run: docker logs wanwei-ci
      - name: Stop container
        if: always()
        run: docker rm --force --volumes wanwei-ci || true
